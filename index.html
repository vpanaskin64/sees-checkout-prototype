<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>See's Candies — Checkout Prototype</title>
  <meta name="description" content="Interactive mobile checkout prototype for See's Candies, featuring multi-recipient shipping, BOPIS pickup, and payment flow.">
  <meta property="og:title" content="See's Candies — Checkout Prototype">
  <meta property="og:description" content="Interactive mobile checkout prototype">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script>
    // Suppress Babel in-browser transformer warning
    const _cw = console.warn.bind(console);
    console.warn = (...args) => {
      if (typeof args[0] === 'string' && args[0].includes('Babel transformer')) return;
      _cw(...args);
    };
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
      min-height: 100vh; font-family: 'Roboto', sans-serif;
      background: #1a1a1a;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    #proto-body {
      flex: 1; display: flex; align-items: flex-start; justify-content: center;
      padding: 56px 24px 80px; width: 100%; gap: 48px;
    }
  </style>
</head>
<body>

  <div id="proto-body">

    <div id="root"></div>
  </div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

// ─── ASSET URLS ──────────────────────────────────────────────────────────────
// Chevron SVG as data URI (replaces broken Figma MCP asset)
const KLARNA_PINK = "#ffb3c7";

// ─── US STATES ────────────────────────────────────────────────────────────────
const US_STATES = ["Alabama","Alaska","Arizona","Arkansas","California","Colorado","Connecticut","Delaware","Florida","Georgia","Hawaii","Idaho","Illinois","Indiana","Iowa","Kansas","Kentucky","Louisiana","Maine","Maryland","Massachusetts","Michigan","Minnesota","Mississippi","Missouri","Montana","Nebraska","Nevada","New Hampshire","New Jersey","New Mexico","New York","North Carolina","North Dakota","Ohio","Oklahoma","Oregon","Pennsylvania","Rhode Island","South Carolina","South Dakota","Tennessee","Texas","Utah","Vermont","Virginia","Washington","West Virginia","Wisconsin","Wyoming"];

// ─── STYLE HELPERS ────────────────────────────────────────────────────────────
const css = {
  // colors
  black: "#111",
  gray300: "#707070",
  gray100: "#eaeaea",
  gray50: "#f6f6f6",
  secondary: "#626264",
  highlight: "#96701b",
  sale: "#bf0000",
  white: "#fff",

  // fonts
  serif: "'Georgia', 'Times New Roman', serif",
  sans: "'Roboto', sans-serif",
};

// ─── ANIMATION STYLES ─────────────────────────────────────────────────────────
const slideDown = {
  animation: "slideDown 0.35s cubic-bezier(0.4,0,0.2,1) both",
};
const fadeIn = {
  animation: "fadeIn 0.25s ease both",
};

// ─── PRIMITIVES ───────────────────────────────────────────────────────────────
function Input({ label, required, placeholder, type = "text", value, onChange, error }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 6, width: "100%" }}>
      {label && (
        <label style={{ fontSize: 12, fontFamily: css.sans, color: css.black, lineHeight: "16px" }}>
          {label}{required && "*"}
        </label>
      )}
      <input
        type={type}
        value={value}
        onChange={e => onChange && onChange(e.target.value)}
        placeholder={placeholder}
        style={{
          border: `1px solid ${error ? css.sale : css.gray300}`,
          background: css.white,
          height: 40,
          padding: "8px 16px",
          fontFamily: css.sans,
          fontSize: 16,
          color: css.black,
          outline: "none",
          width: "100%",
          boxSizing: "border-box",
          transition: "border-color 0.2s",
        }}
        onFocus={e => e.target.style.borderColor = css.black}
        onBlur={e => e.target.style.borderColor = error ? css.sale : css.gray300}
      />
      {error && <span style={{ fontSize: 12, color: css.sale, fontFamily: css.sans }}>{error}</span>}
    </div>
  );
}

function Select({ label, required, value, onChange, options, error }) {
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 6, width: "100%" }}>
      {label && (
        <label style={{ fontSize: 12, fontFamily: css.sans, color: css.black, lineHeight: "16px" }}>
          {label}{required && "*"}
        </label>
      )}
      <div style={{ position: "relative" }}>
        <select
          value={value}
          onChange={e => onChange && onChange(e.target.value)}
          style={{
            border: `1px solid ${error ? css.sale : css.gray300}`,
            background: css.white,
            height: 40,
            padding: "8px 40px 8px 16px",
            fontFamily: css.sans,
            fontSize: 16,
            color: value ? css.black : css.secondary,
            width: "100%",
            appearance: "none",
            outline: "none",
            cursor: "pointer",
            boxSizing: "border-box",
          }}
        >
          <option value="">Select...</option>
          {options.map(o => <option key={o} value={o}>{o}</option>)}
        </select>
        <svg aria-hidden="true" style={{ position: "absolute", right: 12, top: "50%", transform: "translateY(-50%)", width: 10, height: 10, pointerEvents: "none" }} viewBox="0 0 10 10" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 3l3 4 3-4" stroke="#626264" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
      </div>
      {error && <span style={{ fontSize: 12, color: css.sale, fontFamily: css.sans }}>{error}</span>}
    </div>
  );
}

function Checkbox({ checked, onChange, label, children }) {
  return (
    <label style={{ display: "flex", gap: 8, alignItems: "flex-start", cursor: "pointer" }}>
      <div
        onClick={() => onChange && onChange(!checked)}
        style={{
          width: 24, height: 24, flexShrink: 0,
          border: `1px solid ${checked ? css.black : css.secondary}`,
          background: checked ? css.black : css.white,
          display: "flex", alignItems: "center", justifyContent: "center",
          cursor: "pointer", marginTop: 1,
          transition: "background 0.15s, border-color 0.15s",
        }}
      >
        {checked && (
          <svg width="14" height="11" viewBox="0 0 14 11" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M1 5L5 9L13 1" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
          </svg>
        )}
      </div>
      <span style={{ fontFamily: css.sans, fontSize: 16, color: css.secondary, lineHeight: "24px" }}>
        {label || children}
      </span>
    </label>
  );
}

function Radio({ checked, onChange, label }) {
  return (
    <label style={{ display: "flex", gap: 8, alignItems: "center", cursor: "pointer" }}>
      <div
        onClick={() => onChange && onChange()}
        style={{
          width: 24, height: 24, flexShrink: 0,
          border: checked ? `2px solid ${css.black}` : `1px solid ${css.gray300}`,
          borderRadius: "50%",
          background: css.white,
          display: "flex", alignItems: "center", justifyContent: "center",
          cursor: "pointer",
          transition: "border-color 0.15s",
        }}
      >
        {checked && <div style={{ width: 10, height: 10, background: css.black, borderRadius: "50%" }} />}
      </div>
      <span style={{ fontFamily: css.sans, fontSize: 16, color: css.secondary, lineHeight: "24px" }}>{label}</span>
    </label>
  );
}

function Button({ children, variant = "primary", onClick, disabled, style: extraStyle }) {
  const isPrimary = variant === "primary";
  const isDisabled = disabled;
  return (
    <button
      onClick={onClick}
      disabled={isDisabled}
      style={{
        width: "100%",
        minHeight: 50,
        background: isDisabled ? (isPrimary ? "#ccc" : css.white) : (isPrimary ? css.black : css.white),
        color: isDisabled ? css.gray300 : (isPrimary ? css.white : css.black),
        border: isPrimary ? (isDisabled ? "none" : "none") : `1px solid ${isDisabled ? css.gray300 : css.secondary}`,
        fontFamily: css.sans,
        fontSize: 16,
        fontWeight: 700,
        letterSpacing: "0.05em",
        textTransform: "uppercase",
        cursor: isDisabled ? "not-allowed" : "pointer",
        padding: "0 16px",
        transition: "opacity 0.2s, transform 0.1s",
        ...extraStyle,
      }}
      onMouseDown={e => !isDisabled && (e.currentTarget.style.transform = "scale(0.99)")}
      onMouseUp={e => (e.currentTarget.style.transform = "scale(1)")}
    >
      {children}
    </button>
  );
}

function Divider() {
  return <div style={{ width: "100%", height: 1, background: css.gray100 }} />;
}

// ─── STEP INDICATOR ───────────────────────────────────────────────────────────
function StepBadge({ number, status }) {
  // status: "active" | "done" | "next"
  const isDone = status === "done";
  const isNext = status === "next";
  return (
    <div style={{
      width: 40, height: 40, flexShrink: 0, borderRadius: "50%",
      background: isNext ? "transparent" : css.black,
      border: isNext ? `1px solid ${css.gray300}` : (isDone ? `1px solid ${css.black}` : "none"),
      display: "flex", alignItems: "center", justifyContent: "center",
    }}>
      {isDone
        ? <svg width="14" height="11" viewBox="0 0 14 11" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1 5L5 9L13 1" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
        : <span style={{ fontFamily: css.sans, fontWeight: 700, fontSize: 16, color: isNext ? css.gray300 : css.white, lineHeight: "24px" }}>{number}</span>
      }
    </div>
  );
}

function StepHeader({ number, title, status, onEdit }) {
  return (
    <div style={{ display: "flex", gap: 16, alignItems: "center" }}>
      <StepBadge number={number} status={status} />
      <span style={{ fontFamily: css.serif, fontSize: 24, letterSpacing: "0.48px", color: status === "next" ? css.gray300 : css.black, lineHeight: "26px" }}>
        {title}
      </span>
      {status === "done" && onEdit && (
        <button onClick={onEdit} style={{ background: "none", border: "none", fontFamily: css.sans, fontSize: 16, color: css.black, textDecoration: "underline", cursor: "pointer", padding: 0, marginLeft: 4 }}>
          Edit
        </button>
      )}
    </div>
  );
}

// ─── FULFILLMENT TOGGLE ───────────────────────────────────────────────────────
function ShipIcon() {
  return (
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" style={{ width: 20, height: 20, flexShrink: 0, display: "block" }}>
      <path d="M19.9393 10.1767L17.2403 5.89043C17.1645 5.75266 17.0129 5.67612 16.8613 5.67612H12.6459V3.79323C12.6459 3.53299 12.4488 3.33398 12.1911 3.33398H0.45489C0.197119 3.33398 0 3.53299 0 3.79323V14.2639C0 14.5242 0.197119 14.7232 0.45489 14.7232H1.60728C1.81956 15.8254 2.78999 16.6673 3.94238 16.6673C5.09477 16.6673 6.0652 15.8254 6.27748 14.7232H13.5254C13.7377 15.8254 14.7081 16.6673 15.8605 16.6673C17.0129 16.6673 17.9833 15.8254 18.1956 14.7232H19.5451C19.8029 14.7232 20 14.5242 20 14.2639V10.4369C20 10.3298 19.9697 10.2532 19.9242 10.1767H19.9393ZM11.7362 6.13536V13.8047H6.29265C6.08036 12.7025 5.10993 11.8606 3.95754 11.8606C2.80516 11.8606 1.83472 12.7025 1.62244 13.8047H0.924943V4.25247H11.7513V6.13536H11.7362ZM16.6035 6.5946L18.5444 9.68683L15.8302 8.96736L15.4208 6.60991H16.6035V6.5946ZM19.1054 13.8047H18.2108C17.9985 12.7025 17.0281 11.8606 15.8757 11.8606C14.7233 11.8606 13.7528 12.7025 13.5406 13.8047H12.6459V6.5946H14.4958L14.981 9.41129C15.0114 9.59499 15.1478 9.73276 15.3146 9.77868L19.1054 10.789V13.82V13.8047Z" fill="#111111"/>
    </svg>
  );
}

function BopisIcon() {
  return (
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" style={{ width: 20, height: 20, flexShrink: 0, display: "block" }}>
      <path d="M10.4649 11.2484H3.42002C3.15209 11.2484 2.9472 11.4532 2.9472 11.7212V16.1499C2.9472 16.4178 3.15209 16.6227 3.42002 16.6227H10.4649C10.7329 16.6227 10.9377 16.4178 10.9377 16.1499V11.7212C10.9377 11.4532 10.7329 11.2484 10.4649 11.2484ZM9.99212 15.677H3.89283V12.194H9.99212V15.677ZM19.9842 6.97728C19.9842 6.89848 19.937 6.83544 19.9054 6.7724L19.8582 6.6936L16.6273 1.8709C16.5327 1.74482 16.3909 1.66602 16.2333 1.66602H3.68794C3.53034 1.66602 3.37273 1.74482 3.29393 1.88666L0.141844 6.72512L0.0788023 6.81968C0.0788023 6.81968 0.0630419 6.88272 0.0472815 6.91424C0.031521 6.96152 0 7.0088 0 7.05609C0 7.07185 0 7.08761 0 7.10337C0.0157604 7.98595 0.441292 8.75821 1.08747 9.27831V18.4982C1.08747 18.7661 1.29236 18.971 1.56028 18.971H18.424C18.6919 18.971 18.8968 18.7661 18.8968 18.4982V9.27831C19.5429 8.75821 19.9685 7.98595 20 7.08761C20 7.08761 20 7.05609 20 7.04033C20 7.02457 20 7.0088 19.9842 6.97728ZM15.9653 2.61164L18.6131 6.56751L18.6446 6.59903H14.9567V6.55175L13.6328 2.61164H15.9653ZM10.3546 6.55175V2.61164H12.6399L13.948 6.55175V6.58327H10.3546V6.53599V6.55175ZM9.40898 2.61164V6.59903H5.8156V6.55175L7.2498 2.61164H9.40898ZM1.3554 6.55175L3.94011 2.61164H6.2569L4.82269 6.55175V6.58327H1.32388L1.3554 6.53599V6.55175ZM16.0914 17.9308H12.7817V12.194H16.0914V17.9308ZM17.9511 18.0254H17.037V11.7369C17.037 11.469 16.8322 11.2641 16.5642 11.2641H12.3089C12.041 11.2641 11.8361 11.469 11.8361 11.7369V18.0254H2.0331V9.76688C2.28526 9.84568 2.55319 9.89297 2.83688 9.89297C3.82979 9.89297 4.71237 9.37287 5.21671 8.60061C5.72104 9.37287 6.60362 9.89297 7.59653 9.89297C8.58944 9.89297 9.47202 9.37287 9.97636 8.60061C10.4807 9.37287 11.3633 9.89297 12.3562 9.89297C13.3491 9.89297 14.2317 9.37287 14.736 8.60061C15.2403 9.37287 16.1229 9.89297 17.1158 9.89297C17.3995 9.89297 17.6675 9.84568 17.9196 9.76688V18.0254H17.9511Z" fill="#111111"/>
    </svg>
  );
}

function FulfillmentToggle({ value, onChange, multipleRecipients }) {
  const pickupDisabled = multipleRecipients;
  const opts = [
    { id: "ship", label: "Shipping", Icon: ShipIcon },
    { id: "bopis", label: "Pickup", Icon: BopisIcon },
  ];
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 8, width: "100%" }}>
      <div style={{ display: "flex", gap: 8, width: "100%" }}>
        {opts.map(opt => {
          const isDisabled = opt.id === "bopis" && pickupDisabled;
          const isSelected = value === opt.id;
          return (
            <div
              key={opt.id}
              onClick={() => !isDisabled && onChange(opt.id)}
              style={{
                flex: 1, padding: 16,
                cursor: isDisabled ? "not-allowed" : "pointer",
                border: `1px solid ${isSelected ? css.black : css.gray100}`,
                background: isDisabled ? css.gray50 : css.white,
                display: "flex", flexDirection: "column", gap: 8,
                transition: "border-color 0.2s",
                opacity: isDisabled ? 0.5 : 1,
              }}
            >
              <opt.Icon />
              <span style={{
                fontFamily: css.sans, fontWeight: 700, fontSize: 12,
                color: isDisabled ? css.secondary : (isSelected ? css.black : css.secondary),
                letterSpacing: "-0.24px", lineHeight: "16px",
              }}>
                {opt.label}
              </span>
            </div>
          );
        })}
      </div>
      {pickupDisabled && (
        <div style={{
          display: "flex", alignItems: "flex-start", gap: 6,
          padding: "8px 12px",
          background: "#fef9ec",
          border: "1px solid #e8d48b",
          borderRadius: 2,
        }}>
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style={{ flexShrink: 0, marginTop: 1 }}>
            <circle cx="8" cy="8" r="7.5" stroke="#96701b"/>
            <path d="M8 4.5V8.5M8 10.5V11" stroke="#96701b" strokeWidth="1.5" strokeLinecap="round"/>
          </svg>
          <span style={{ fontFamily: css.sans, fontSize: 12, color: "#96701b", lineHeight: "18px" }}>
            Pickup is only available for single-recipient orders. Please remove other recipients first to switch to pickup.
          </span>
        </div>
      )}
    </div>
  );
}

// ─── ADDRESS FORM ─────────────────────────────────────────────────────────────
function AddressForm({ data, onChange, errors = {} }) {
  const set = (field) => (val) => onChange({ ...data, [field]: val });
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12, width: "100%", ...slideDown }}>
      <div>
        <span style={{ fontFamily: css.sans, fontWeight: 700, fontSize: 12, color: css.black }}>Shipping to: United States</span>
      </div>
      <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
        <span style={{ fontFamily: css.sans, fontSize: 12, color: css.black }}>Address Type</span>
        <div style={{ display: "flex", gap: 20 }}>
          <Radio checked={data.addressType === "home"} onChange={() => set("addressType")("home")} label="Home" />
          <Radio checked={data.addressType === "business"} onChange={() => set("addressType")("business")} label="Business" />
        </div>
      </div>
      <div style={{ display: "flex", gap: 12 }}>
        <Input label="First Name" required value={data.firstName} onChange={set("firstName")} error={errors.firstName} />
        <Input label="Last Name" required value={data.lastName} onChange={set("lastName")} error={errors.lastName} />
      </div>
      <Checkbox checked={data.poBox} onChange={set("poBox")} label="Delivering to a PO Box instead?" />
      <Input label="Street Address" required value={data.street} onChange={set("street")} error={errors.street} />
      <Input label="Unit/Suite/Building" value={data.unit} onChange={set("unit")} />
      <Input label="City" required value={data.city} onChange={set("city")} error={errors.city} />
      <div style={{ display: "flex", gap: 12 }}>
        <Select label="State" required value={data.state} onChange={set("state")} options={US_STATES} error={errors.state} />
        <Input label="Zip/Postal Code" required value={data.zip} onChange={set("zip")} error={errors.zip} />
      </div>
      <Input label="Phone" required type="tel" value={data.phone} onChange={set("phone")} error={errors.phone} />
      <Checkbox checked={data.useBilling} onChange={set("useBilling")} label="Use this address for Billing" />
    </div>
  );
}

// ─── STORE SELECTOR (BOPIS) ───────────────────────────────────────────────────
// ─── PICKUP FORM (BOPIS) — matches Figma node 78135:100416 ───────────────────
// Shows pickup location details + "Person Picking Up Order" fields
function PickupForm({ data, onChange, errors = {} }) {
  const set = (field) => (val) => onChange({ ...data, [field]: val });
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 24, ...slideDown }}>

      {/* 1. CONTACT — email + opt-in */}
      <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
          <span style={{ fontFamily: css.sans, fontWeight: 700, fontSize: 16, color: css.black, lineHeight: "24px", textTransform: "uppercase" }}>Contact</span>
          <span style={{ fontFamily: css.sans, fontStyle: "italic", fontSize: 12, color: css.black, whiteSpace: "nowrap", flexShrink: 0, paddingTop: 4 }}>* Required Fields</span>
        </div>
        <Input label="Email" required type="email" value={data.pickupEmail || ""} onChange={set("pickupEmail")} error={errors.pickupEmail} />
        <Checkbox checked={data.pickupEmailOptIn || false} onChange={set("pickupEmailOptIn")}>
          Join our email community and be the first to know about promotions, special offers, limited-time sweets, and new candies! | <span style={{ textDecoration: "underline" }}>Privacy Policy</span>
        </Checkbox>
      </div>

      {/* 2. PERSON PICKING UP ORDER — name + phone */}
      <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
          <span style={{ fontFamily: css.sans, fontWeight: 700, fontSize: 16, color: css.black, lineHeight: "24px", textTransform: "uppercase" }}>Person Picking Up Order</span>
          <span style={{ fontFamily: css.sans, fontStyle: "italic", fontSize: 12, color: css.black, whiteSpace: "nowrap", flexShrink: 0, paddingTop: 4 }}>* Required Fields</span>
        </div>
        <Input label="First Name" required value={data.pickupFirstName || ""} onChange={set("pickupFirstName")} error={errors.pickupFirstName} />
        <Input label="Last Name" required value={data.pickupLastName || ""} onChange={set("pickupLastName")} error={errors.pickupLastName} />
        <Input label="Phone" required type="tel" value={data.pickupPhone || ""} onChange={set("pickupPhone")} error={errors.pickupPhone} />
      </div>

      {/* 3. Pick Up Location card */}
      <div style={{ border: `1px solid ${css.gray100}`, padding: 24 }}>
        <div style={{ fontFamily: css.sans, fontSize: 16, color: css.black, lineHeight: "24px" }}>
          <div style={{ fontWeight: 700 }}>Pick Up Location:</div>
          <div>112 Caruso Ave</div>
          <div>Americana At Brand</div>
          <div>Glendale, CA 91210</div>
          <div>Phone (714) 232-1281</div>
        </div>
      </div>

    </div>
  );
}

// ─── SHIPPING METHOD ──────────────────────────────────────────────────────────

// ─── RECIPIENT CARD (DELIVERY STEP) ──────────────────────────────────────────
function RecipientCardDelivery({ recipient, index, isExpanded, onExpand, onUpdate, onRemove, isOnly, showErrors, onPickupSelected }) {
  const [addr, setAddr] = useState(recipient.address || { addressType: "home", firstName: "", lastName: "", street: "", unit: "", city: "", state: "", zip: "", phone: "", isResidence: true, useBilling: index === 0, poBox: false });
  const [pickupData, setPickupData] = useState(recipient.storeData || {});
  const [shippingMethod, setShippingMethod] = useState(recipient.shippingMethod || "standard");
  const [giftMsg, setGiftMsg] = useState(recipient.giftMessage || "");
  const [email, setEmail] = useState(recipient.email || "");
  const [emailOptIn, setEmailOptIn] = useState(recipient.emailOptIn || false);

  // Field-level errors shown when parent triggers validation
  const errors = showErrors && recipient.fulfillment !== "bopis" ? {
    firstName: !addr.firstName ? "Required" : "",
    lastName: !addr.lastName ? "Required" : "",
    street: !addr.street ? "Required" : "",
    city: !addr.city ? "Required" : "",
    state: !addr.state ? "Required" : "",
    zip: !addr.zip ? "Required" : "",
    phone: !addr.phone ? "Required" : "",
  } : {};
  const emailError = showErrors && index === 0 && recipient.fulfillment !== "bopis" && !email ? "Required" : "";

  const addrComplete = addr.firstName && addr.lastName && addr.street && addr.city && addr.state && addr.zip && addr.phone;
  const storeComplete = pickupData.pickupFirstName && pickupData.pickupLastName && pickupData.pickupPhone && pickupData.pickupEmail;
  const fulfillmentComplete = recipient.fulfillment === "ship" ? (addrComplete && shippingMethod) : storeComplete;
  const isComplete = fulfillmentComplete && (index === 0 && recipient.fulfillment !== "bopis" ? !!email : true);

  // Save back up when user finishes
  useEffect(() => {
    if (isComplete) {
      onUpdate({ ...recipient, address: addr, storeData: pickupData, shippingMethod, giftMessage: giftMsg, email, emailOptIn, isComplete: true });
    }
  }, [addr, pickupData, shippingMethod, giftMsg, email, emailOptIn]);

  const handleFulfillmentChange = (type) => {
    onUpdate({ ...recipient, fulfillment: type, isComplete: false });
    setShippingMethod("standard");
    // Pickup is single-recipient only — parent will trim via onFulfillmentChange
    if (type === "bopis" && onPickupSelected) onPickupSelected();
  };

  // Summary for collapsed state
  const recipientName = addr.firstName && addr.lastName ? `${addr.firstName} ${addr.lastName}` : `Recipient ${index + 1}`;
  const summaryAddr = addr.city && addr.state ? `${addr.street}, ${addr.city}, ${addr.state} ${addr.zip}` : "";
  const storeName = pickupData.pickupFirstName ? `${pickupData.pickupFirstName || ""} ${pickupData.pickupLastName || ""}`.trim() : "";
  const cardRef = useRef(null);

  const handleExpand = () => {
    const willExpand = !isExpanded;
    onExpand(willExpand ? index : null);
    if (willExpand) {
      setTimeout(() => {
        cardRef.current?.scrollIntoView({ behavior: "smooth", block: "start" });
      }, 50);
    }
  };

  return (
    <div ref={cardRef} style={{ border: `1px solid ${!isOnly && isExpanded ? css.black : css.gray100}`, transition: "border-color 0.2s", scrollMarginTop: 16 }}>
      {/* Card Header — accordion, only for multi-recipient */}
      {!isOnly && (
        <div
          style={{ padding: isExpanded ? "16px 12px 0" : "16px 12px", cursor: "pointer", display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}
          onClick={handleExpand}
        >
          <div style={{ flex: 1, minWidth: 0 }}>
            {/* Top label row: RECIPIENT N + pill badge */}
            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: isExpanded ? 0 : 12 }}>
              <span style={{ fontFamily: css.sans, fontWeight: 700, fontSize: 16, color: css.black, textTransform: "uppercase", lineHeight: "24px", whiteSpace: "nowrap" }}>
                Recipient {index + 1}
              </span>
              {isComplete && !isExpanded && addr.useBilling && (
                <span style={{ background: css.gray100, padding: "2px 6px", fontFamily: css.sans, fontSize: 11, color: css.black, lineHeight: "24px", whiteSpace: "nowrap", flexShrink: 0 }}>
                  Billing Address
                </span>
              )}
            </div>
            {/* Collapsed summary */}
            {isComplete && !isExpanded && (
              <>
                <div style={{ fontFamily: css.sans, fontSize: 16, color: css.black, lineHeight: "24px", marginBottom: 4 }}>
                  {recipientName}
                </div>
                {recipient.fulfillment === "bopis" ? (
                  <div style={{ fontFamily: css.sans, fontSize: 14, color: css.secondary, lineHeight: "20px" }}>Pickup: {storeName}</div>
                ) : (
                  <>
                    <div style={{ fontFamily: css.sans, fontSize: 14, color: css.secondary, lineHeight: "20px" }}>
                      {addr.street}{addr.zip ? `, ${addr.zip}` : ""}{addr.phone ? `, ${addr.phone}` : ""}
                    </div>
                    <div style={{ display: "flex", gap: 8, alignItems: "baseline", marginTop: 8 }}>
                      <span style={{ fontFamily: css.sans, fontSize: 14, color: css.black, lineHeight: "20px" }}>Standard Shipping</span>
                      <span style={{ fontFamily: css.sans, fontSize: 14, color: css.secondary, lineHeight: "20px" }}>Dec. 29 – Jan. 3</span>
                    </div>
                  </>
                )}
                <div style={{ display: "flex", gap: 8, marginTop: 12, flexWrap: "wrap" }}>
                  {[1, 2].map(n => (
                    <div key={n} style={{ position: "relative", flex: "1 0 0", maxWidth: 60 }}>
                      <div style={{ aspectRatio: "1/1", overflow: "hidden", border: `1px solid ${css.gray100}` }}>

                      <div style={{ position: "absolute", top: -6, right: -6, width: 18, height: 18, background: css.black, borderRadius: "50%", display: "flex", alignItems: "center", justifyContent: "center" }}>
                        <span style={{ fontFamily: css.sans, fontSize: 11, color: "#fff", lineHeight: 1 }}>{n}</span>
                      </div>
                    </div>
                  ))}
                  {[3,4,5,6].map(n => <div key={n} style={{ flex: "1 0 0", maxWidth: 60, opacity: 0 }}><div style={{ aspectRatio: "1/1" }} /></div>)}

            {!isComplete && !isExpanded && (

            )}
          </div>
          <div style={{ display: "flex", gap: 8, alignItems: "flex-start", flexShrink: 0, marginLeft: 12 }}>
            {isComplete && !isExpanded && (
              <span style={{ fontFamily: css.sans, fontWeight: 700, fontSize: 14, color: css.black, lineHeight: "20px", whiteSpace: "nowrap" }}>$80.51</span>
            )}
            <svg aria-hidden="true" style={{ width: 10, height: 16, marginTop: 4, transform: isExpanded ? "rotate(-90deg)" : "rotate(90deg)", transition: "transform 0.25s" }} viewBox="0 0 10 16" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 2l6 6-6 6" stroke="#111" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/></svg>
          </div>
        </div>
      )}

      {/* Single-recipient title — no number, no accordion */}
      {isOnly && (
        <div style={{ padding: "16px 12px 0" }}>
          <span style={{ fontFamily: css.sans, fontWeight: 700, fontSize: 16, color: css.black, textTransform: "uppercase", lineHeight: "24px" }}>
            Recipient
          </span>
        </div>
      )}

      {/* Card Body — always open for single recipient, accordion-gated for multi */}
      {(isOnly || isExpanded) && (
        <div style={{ padding: `${index === 0 ? 20 : 12}px 12px 20px`, ...(isOnly ? {} : slideDown) }}>
          {/* Fulfillment toggle — only for first recipient; pickup locks to single recipient */}
          {index === 0 && <FulfillmentToggle value={recipient.fulfillment || "ship"} onChange={handleFulfillmentChange} multipleRecipients={!isOnly} />}
          {index === 0 && <div style={{ marginTop: 16 }} />}

          {/* Contact section — only for first recipient, and only for shipping (pickup collects email in person form) */}
          {index === 0 && recipient.fulfillment !== "bopis" && <div style={{ display: "flex", flexDirection: "column", gap: 12, marginBottom: 20 }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span style={{ fontFamily: css.sans, fontWeight: 700, fontSize: 16, color: css.black, textTransform: "uppercase", lineHeight: "24px" }}>Contact</span>
              <span style={{ fontFamily: css.sans, fontStyle: "italic", fontSize: 12, color: css.black }}>* Required Fields</span>
            </div>
            <Input label="Email" required value={email} onChange={setEmail} placeholder="" error={emailError} />
            <Checkbox checked={emailOptIn} onChange={setEmailOptIn}>
              Join our email community and be the first to know about promotions, special offers, limited-time sweets, and new candies! | <span style={{ textDecoration: "underline" }}>Privacy Policy</span>
            </Checkbox>
          </div>}

          {recipient.fulfillment === "bopis" ? (
            <PickupForm data={pickupData} onChange={setPickupData} errors={showErrors && recipient.fulfillment === "bopis" ? {
              pickupFirstName: !pickupData.pickupFirstName ? "Required" : "",
              pickupLastName: !pickupData.pickupLastName ? "Required" : "",
              pickupPhone: !pickupData.pickupPhone ? "Required" : "",
              pickupEmail: !pickupData.pickupEmail ? "Required" : "",
            } : {}} />
          ) : (
            <>
              <AddressForm data={addr} onChange={setAddr} errors={errors} />
              <div style={{ marginTop: 20 }}>
                <GiftMessage value={giftMsg} onChange={setGiftMsg} />
              </div>
              <div style={{ marginTop: 20, marginBottom: 8 }}>
                <div style={{ fontFamily: css.sans, fontWeight: 700, fontSize: 16, color: css.black, marginBottom: 12 }}>SHIPPING METHOD OR DELIVERY DATE</div>
                {addrComplete ? (
                  <ShippingMethod value={shippingMethod} onChange={setShippingMethod} />
                ) : (
                  <div style={{ background: css.gray50, padding: 20 }}>
                    <p style={{ fontFamily: css.sans, fontSize: 16, color: css.black, textAlign: "center", lineHeight: "24px", margin: 0 }}>
                      Enter your shipping address to view available shipping methods.
                    </p>
                  </div>
                )}
              </div>
            </>
          )}

          {/* Gift message for BOPIS */}
          {recipient.fulfillment === "bopis" && storeComplete && (
            <div style={{ marginTop: 20 }}>
              <GiftMessage value={giftMsg} onChange={setGiftMsg} />
            </div>
          )}

          {/* Recipient total accordion — always visible, collapsed by default */}
          <RecipientTotalAccordion
            items={[
              { name: "Assorted Chocolates", sku: "#500310", size: "1 lb", price: "$29.50" },
              { name: "Lemon Drops", sku: "#500310", size: "8 oz", price: "$11.00", salePrice: "$40.50", origPrice: "$45.00" },
            ]}
          />

          {/* Remove Recipient — always visible below the total, only when not the only recipient */}
          {!isOnly && (
            <span
              onClick={onRemove}
              style={{ fontFamily: css.sans, fontSize: 14, color: css.secondary, lineHeight: "20px", textDecoration: "underline", cursor: "pointer", display: "inline-block", marginTop: 4 }}
            >
              Remove Recipient
            </span>
          )}
        </div>
      )}
    </div>
  );
}

// ─── RECIPIENT REVIEW CARD (PAYMENT STEP) ────────────────────────────────────
function RecipientReviewCard({ recipient, index, onRemove }) {
  const [expanded, setExpanded] = useState(false);
  const addr = recipient.address || {};
  const name = addr.firstName ? `${addr.firstName} ${addr.lastName}` : `Recipient ${index + 1}`;
  const addrLine = addr.city
    ? [addr.street, addr.city, addr.state, addr.zip].filter(Boolean).join(", ") + (addr.phone ? `, ${addr.phone}` : "")
    : (recipient.storeData?.pickupFirstName ? `${recipient.storeData.pickupFirstName} ${recipient.storeData.pickupLastName || ""}`.trim() : "Pickup");

  const items = recipient.items || [
    { name: "Assorted Chocolates", sku: "#500310", size: "1 lb", qty: 2, price: "$29.50" },
    { name: "Lemon Drops", sku: "#500310", size: "8 oz", qty: 2, price: "$11.00" },
  ];
  const itemCount = items.reduce((s, it) => s + it.qty, 0);
  const subtotal = "$70.00";
  const shippingOrig = "$11.95";
  const shippingDisc = "$6.95";
  const tax = "$3.56";
  const total = "$80.51";

  // Chevron SVG (down when collapsed, up when expanded)
  const Chevron = () => (
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"
      style={{ transform: expanded ? "rotate(-90deg)" : "rotate(90deg)", transition: "transform 0.2s", flexShrink: 0 }}>
      <path d="M9 18L15 12L9 6" stroke="#111" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );

  return (
    <div style={{ border: `1px solid ${css.gray100}` }}>
      {/* ── COLLAPSED: top header row — always visible ── */}
      {/* Figma node 78090:90720 — px:12 py:16, gap:12 between left col and right group */}
      <div
        onClick={() => setExpanded(e => !e)}
        style={{ padding: "16px 12px", display: "flex", gap: 12, alignItems: "flex-start", cursor: "pointer" }}
      >
        {/* Left: label + name, gap:12 */}
        <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 12 }}>
          <span style={{ fontFamily: css.sans, fontWeight: 700, fontSize: 14, color: css.black, textTransform: "uppercase", lineHeight: "24px" }}>
            RECIPIENT {index + 1}
          </span>
          <span style={{ fontFamily: css.sans, fontSize: 16, color: css.black, lineHeight: "24px" }}>{name}</span>
        </div>
        {/* Right: price + chevron, gap:8 */}
        <div style={{ display: "flex", gap: 8, alignItems: "center", flexShrink: 0 }}>
          <span style={{ fontFamily: css.sans, fontWeight: 700, fontSize: 14, color: css.black, lineHeight: "20px" }}>{total}</span>
          <Chevron />
        </div>
      </div>

      {/* ── COLLAPSED body: address + shipping + thumbnails ── */}
      {/* Figma node 78090:90733 — pb:12 px:12 gap:16 */}
      {!expanded && (
        <div style={{ paddingBottom: 12, paddingLeft: 12, paddingRight: 12, display: "flex", flexDirection: "column", gap: 16 }}>
          {/* Address — 14/Regular, secondary */}
          {addrLine && (
            <div style={{ fontFamily: css.sans, fontSize: 14, color: css.secondary, lineHeight: "20px" }}>{addrLine}</div>
          )}
          {/* Shipping + date — gap:8, items aligned bottom */}
          {/* Figma node 78090:90735 — gap:8 items-end */}
          <div style={{ display: "flex", gap: 8, alignItems: "flex-end" }}>
            <span style={{ fontFamily: css.sans, fontSize: 14, color: css.black, lineHeight: "20px" }}>Standard Shipping</span>
            <span style={{ fontFamily: css.sans, fontSize: 14, color: css.secondary, lineHeight: "20px" }}>Dec. 29 - Jan. 3</span>
          </div>
          {/* Thumbnails grid — flex-wrap gap:12 */}
          {/* Figma node 78090:90738 — flex-wrap gap:12 */}
          <div style={{ display: "flex", flexWrap: "wrap", gap: 12, alignItems: "center", width: "100%" }}>
            {items.map((item, i) => (
              <div key={i} style={{ position: "relative", flex: "1 0 0", minWidth: 0 }}>
                <div style={{ aspectRatio: "1 / 1", width: "100%", overflow: "hidden", border: `1px solid ${css.gray100}` }}><ProductThumb index={i} /></div>
                <div style={{
                  position: "absolute", top: -8, right: -6,
                  width: 18, height: 18, borderRadius: "100px",
                  background: css.black, display: "flex", alignItems: "center", justifyContent: "center",
                }}>
                  <span style={{ fontFamily: css.sans, fontSize: 11, color: css.white, lineHeight: "1.5" }}>{item.qty}</span>
                </div>
              </div>
            ))}
            {Array.from({ length: Math.max(0, 6 - items.length) }).map((_, i) => (
              <div key={`ghost-${i}`} style={{ flex: "1 0 0", minWidth: 0, opacity: 0 }}>
                <div style={{ aspectRatio: "1 / 1", width: "100%" }} />
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── EXPANDED body ── */}
      {/* Figma node 78090:90884 — pt:16 pb:20 px:12 gap:24 (outer column) */}
      {expanded && (
        <div style={{ paddingLeft: 12, paddingRight: 12, paddingBottom: 20, display: "flex", flexDirection: "column", gap: 24 }}>
          {/* Address — 14/Regular secondary */}
          {addrLine && (
            <div style={{ fontFamily: css.sans, fontSize: 14, color: css.secondary, lineHeight: "20px" }}>{addrLine}</div>
          )}

          {/* Shipping + date — gap:8 items-end */}
          <div style={{ display: "flex", gap: 8, alignItems: "flex-end" }}>
            <span style={{ fontFamily: css.sans, fontSize: 14, color: css.black, lineHeight: "20px" }}>Standard Shipping</span>
            <span style={{ fontFamily: css.sans, fontSize: 14, color: css.secondary, lineHeight: "20px" }}>Dec. 29 - Jan. 3</span>
          </div>

          {/* Gift message — gap:12 */}
          {recipient.giftMessage && (
            <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
              <span style={{ fontFamily: css.sans, fontSize: 14, color: css.black, lineHeight: "20px" }}>Gift Message</span>

          )}

          {/* Recipient Total label — gap:8 items baseline */}
          <div style={{ display: "flex", gap: 8, alignItems: "baseline" }}>
            <span style={{ fontFamily: css.sans, fontWeight: 700, fontSize: 16, color: css.black, textTransform: "uppercase", lineHeight: "24px" }}>RECIPIENT TOTAL:</span>
            <span style={{ fontFamily: css.sans, fontSize: 12, color: css.secondary, lineHeight: "16px" }}>{itemCount} items</span>
          </div>

          {/* Items list — gap:24 between items */}
          <div style={{ display: "flex", flexDirection: "column", gap: 24 }}>
            {items.map((item, i) => (
              <div key={i} style={{ display: "flex", gap: 16, alignItems: "flex-start" }}>
                <div style={{ width: 84, height: 84, flexShrink: 0, overflow: "hidden", border: `1px solid ${css.gray100}` }}><ProductThumb index={i} size={84} /></div>
                <div style={{ flex: 1, display: "flex", flexDirection: "column", gap: 12 }}>
                  <div style={{ display: "flex", gap: 16, justifyContent: "space-between", alignItems: "flex-start" }}>
                    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                      <span style={{ fontFamily: css.sans, fontSize: 16, color: css.black, lineHeight: "24px" }}>{item.name}</span>
                      <div style={{ display: "flex", gap: 16, alignItems: "center" }}>
                        <span style={{ fontFamily: css.sans, fontSize: 12, color: css.secondary, lineHeight: "16px" }}>{item.sku}</span>
                        <span style={{ fontFamily: css.sans, fontSize: 12, color: css.secondary, lineHeight: "16px" }}>{item.size} | Qty: {item.qty}</span>
                      </div>
                    </div>
                    <span style={{ fontFamily: css.sans, fontWeight: 700, fontSize: 16, color: css.black, lineHeight: "20px", whiteSpace: "nowrap" }}>{item.price}</span>
                  </div>
                  <span style={{ fontFamily: css.sans, fontSize: 12, color: css.secondary, lineHeight: "16px" }}>
                    This item must be scheduled for delivery on or before February 21st
                  </span>
                </div>
              </div>
            ))}
          </div>

          {/* Divider */}
          <div style={{ height: 1, background: css.gray100 }} />

          {/* Pricing breakdown — gap:16 */}
          <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
            <div style={{ display: "flex", justifyContent: "space-between" }}>
              <span style={{ fontFamily: css.sans, fontSize: 16, color: css.secondary, lineHeight: "24px" }}>Subtotal:</span>
              <span style={{ fontFamily: css.sans, fontSize: 16, color: css.black, lineHeight: "24px" }}>{subtotal}</span>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between" }}>
              <span style={{ fontFamily: css.sans, fontSize: 14, color: css.secondary, lineHeight: "20px" }}>Shipping:</span>
              <span style={{ fontFamily: css.sans, fontSize: 14, lineHeight: "20px" }}>
                <span style={{ textDecoration: "line-through", color: css.black }}>{shippingOrig}</span>
                {"  "}
                <span style={{ fontWeight: 700, color: css.sale }}>{shippingDisc}</span>
              </span>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between" }}>
              <span style={{ fontFamily: css.sans, fontSize: 14, color: css.secondary, lineHeight: "20px" }}>Sales Tax:</span>
              <span style={{ fontFamily: css.sans, fontSize: 14, color: css.black, lineHeight: "20px" }}>{tax}</span>
            </div>
            <div style={{ display: "flex", justifyContent: "space-between" }}>
              <span style={{ fontFamily: css.sans, fontWeight: 700, fontSize: 16, color: css.black, lineHeight: "24px" }}>Shipment Total:</span>
              <span style={{ fontFamily: css.sans, fontWeight: 700, fontSize: 16, color: css.black, lineHeight: "24px" }}>{total}</span>
            </div>
          </div>

          {/* Remove recipient */}
          {onRemove && (
            <div>
              <span onClick={onRemove} style={{ fontFamily: css.sans, fontSize: 14, color: css.secondary, lineHeight: "20px", textDecoration: "underline", cursor: "pointer" }}>
                Remove Recipient
              </span>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── MAIN PROTOTYPE ──────────────────────────────────────────────────────────
function CheckoutPrototype() {
  const [phase, setPhase] = useState("delivery"); // "delivery" | "payment" | "confirmed"
  const [expandedRecipient, setExpandedRecipient] = useState(0);
  const [recipients, setRecipients] = useState([
    { id: 1, fulfillment: "ship", address: null, shippingMethod: "standard", giftMessage: "", isComplete: false }
  ]);
  const [paymentData, setPaymentData] = useState({ method: "credit", sameAsShipping: true });
  const [billingData, setBillingData] = useState({ sameAsShipping: true, termsAgreed: false });
  const [toast, setToast] = useState(null); // { message, incompleteIndex }
  const [recipientErrors, setRecipientErrors] = useState(new Set()); // indices with validation shown
  const toastTimerRef = useRef(null);
  const paymentRef = useRef(null);
  const paymentHeaderRef = useRef(null);
  const scrollContainerRef = useRef(null);

  // Scroll to payment section — offset so ~100px of the last recipient card peeks above
  useEffect(() => {
    if (phase === "payment") {
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          const target = paymentHeaderRef.current || paymentRef.current;
          if (!target || !scrollContainerRef.current) return;
          const containerTop = scrollContainerRef.current.getBoundingClientRect().top;
          const paymentTop = target.getBoundingClientRect().top;
          const offset = paymentTop - containerTop + scrollContainerRef.current.scrollTop - 200;
          scrollContainerRef.current.scrollTo({ top: offset, behavior: "smooth" });
        });
      });
    }
  }, [phase]);


  const showToast = (message, incompleteIndex) => {
    if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
    setToast({ message, incompleteIndex });
    toastTimerRef.current = setTimeout(() => setToast(null), 3500);
  };

  const handleToastClick = (incompleteIndex) => {
    setToast(null);
    setExpandedRecipient(incompleteIndex);
    setTimeout(() => {
      document.getElementById("recipient-" + incompleteIndex)?.scrollIntoView({ behavior: "smooth", block: "start" });
    }, 50);
  };

  const allRecipientsComplete = recipients.every(r => r.isComplete);
  const canPlaceOrder = paymentData.method && billingData.termsAgreed;
  const [paymentErrors, setPaymentErrors] = useState({});

  const handlePlaceOrder = () => {
    const errs = {};
    if (paymentData.method === "credit") {
      if (!paymentData.cardNumber) errs.cardNumber = "Required";
      if (!paymentData.expiry) errs.expiry = "Required";
      if (!paymentData.cvv) errs.cvv = "Required";
    }
    if (!billingData.termsAgreed) errs.termsAgreed = true;
    if (billingData.sameAsShipping === false) {
      const ba = billingData.billingAddr || {};
      if (!ba.firstName) errs.billingFirstName = "Required";
      if (!ba.lastName) errs.billingLastName = "Required";
      if (!ba.street) errs.billingStreet = "Required";
      if (!ba.city) errs.billingCity = "Required";
      if (!ba.state) errs.billingState = "Required";
      if (!ba.zip) errs.billingZip = "Required";
      if (!ba.phone) errs.billingPhone = "Required";
    }
    if (Object.keys(errs).length > 0) {
      setPaymentErrors(errs);
      // Scroll to first error in priority order
      setTimeout(() => {
        const priority = [
          errs.cardNumber || errs.expiry || errs.cvv ? 'payment-error-card' : null,
          errs.billingFirstName || errs.billingStreet ? 'payment-error-billing' : null,
          errs.termsAgreed ? 'payment-error-terms' : null,
        ].filter(Boolean);
        const el = document.getElementById(priority[0]);
        el?.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 50);
      return;
    }
    setPaymentErrors({});
    setPhase("confirmed");
  };

  const updateRecipient = (index, data) => {
    const updated = [...recipients];
    updated[index] = data;
    setRecipients(updated);
    // Clear validation errors when recipient becomes complete
    if (data.isComplete) {
      setRecipientErrors(prev => { const next = new Set(prev); next.delete(index); return next; });
    }
    // Cards do NOT auto-collapse on completion — only user actions collapse them
  };

  // Shared: show errors, expand, scroll, toast for a given incomplete recipient index
  const triggerIncomplete = (incompleteIndex, toastMessage) => {
    setRecipientErrors(prev => new Set([...prev, incompleteIndex]));
    setExpandedRecipient(incompleteIndex);
    showToast(toastMessage, incompleteIndex);
    setTimeout(() => {
      document.getElementById("recipient-" + incompleteIndex)?.scrollIntoView({ behavior: "smooth", block: "start" });
    }, 50);
  };

  const handleContinueToPayment = () => {
    const firstIncomplete = recipients.findIndex(r => !r.isComplete);
    if (firstIncomplete !== -1) {
      triggerIncomplete(firstIncomplete, "Please complete Recipient " + (firstIncomplete + 1) + " before continuing.");
      return;
    }
    // Collapse all cards before entering payment
    setExpandedRecipient(null);
    setPhase("payment");
  };

  const addRecipient = () => {
    const lastIndex = recipients.length - 1;
    if (!recipients[lastIndex]?.isComplete) {
      triggerIncomplete(lastIndex, "Please complete Recipient " + (lastIndex + 1) + " before adding another.");
      return;
    }
    if (recipients.length >= 15) return;
    const newId = Date.now();
    const newIndex = recipients.length;
    setRecipients([...recipients, { id: newId, fulfillment: "ship", address: null, shippingMethod: "standard", giftMessage: "", isComplete: false }]);
    // Collapse all existing cards, expand the new one
    setExpandedRecipient(newIndex);
    setTimeout(() => document.getElementById("recipient-" + recipients.length)?.scrollIntoView({ behavior: "smooth", block: "start" }), 100);
  };

  const removeRecipient = (index) => {
    if (recipients.length <= 1) return;
    const updated = recipients.filter((_, i) => i !== index);
    setRecipients(updated);
    setExpandedRecipient(Math.min(expandedRecipient, updated.length - 1));
  };

  const firstRecipientAddr = recipients[0]?.address;

  return (
    <div style={{ display: "flex", justifyContent: "center", width: "100%", fontFamily: css.sans }}>
      <style>{`
        @keyframes slideDown {
          from { opacity: 0; transform: translateY(-12px); }
          to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
          from { opacity: 0; }
          to { opacity: 1; }
        }
        @keyframes toastIn {
          from { opacity: 0; transform: translateX(-50%) translateY(-16px); }
          to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        * { box-sizing: border-box; }
        .iphone-scroll::-webkit-scrollbar { display: none; }
        .iphone-scroll { -ms-overflow-style: none; scrollbar-width: none; }
        input, select, textarea, button { font-family: inherit; }
      `}</style>

      {toast && (
        <Toast
          message={toast.message}
          onClose={() => setToast(null)}
          onClick={() => handleToastClick(toast.incompleteIndex)}
        />
      )}
      {/* iPhone 14 Pro frame */}
      <div style={{
        position: "relative",
        width: 393,
        height: 780,
        background: "linear-gradient(145deg, #2a2a2a 0%, #1a1a1a 50%, #222 100%)",
        borderRadius: 40.6,
        boxShadow: "0 0 0 1px #3d3d3d, 0 0 0 2.5px #111, 0 40px 100px rgba(0,0,0,0.8), 0 8px 32px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.12), inset 0 0 0 1px rgba(255,255,255,0.04)",
        flexShrink: 0,
      }}>
        {/* Side buttons */}
        <div style={{ position: "absolute", left: -3, top: 120.2, width: 3, height: 27, background: "#2a2a2a", borderRadius: "3px 0 0 3px" }} />
        <div style={{ position: "absolute", left: -3, top: 156.2, width: 3, height: 27, background: "#2a2a2a", borderRadius: "3px 0 0 3px" }} />
        <div style={{ position: "absolute", right: -3, top: 135.2, width: 3, height: 54.1, background: "#2a2a2a", borderRadius: "0 3px 3px 0" }} />
        {/* Screen bezel */}
        <div style={{ position: "absolute", inset: 7.5, background: "#000", borderRadius: 34.5, overflow: "hidden" }}>
          {/* Status bar */}
          <div style={{
            position: "absolute", top: 0, left: 0, right: 0, height: 38,
            background: css.white, zIndex: 10,
            display: "flex", alignItems: "flex-end", justifyContent: "space-between",
            padding: "0 21px 6px",
          }}>
            <span style={{ fontFamily: css.sans, fontWeight: 700, fontSize: 13, color: css.black, letterSpacing: "-0.3px" }}>9:41</span>
            <div style={{ position: "absolute", top: 9, left: "50%", transform: "translateX(-50%)", width: 90.1, height: 25.5, background: "#000", borderRadius: 20 }} />
            <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
              <svg width="17" height="12" viewBox="0 0 17 12" fill="none">
                <rect x="0" y="7" width="3" height="5" rx="0.5" fill="#111"/>
                <rect x="4.5" y="4.5" width="3" height="7.5" rx="0.5" fill="#111"/>
                <rect x="9" y="2" width="3" height="10" rx="0.5" fill="#111"/>
                <rect x="13.5" y="0" width="3" height="12" rx="0.5" fill="#111"/>
              </svg>
              <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
                <path d="M8 9.5a1.5 1.5 0 1 1 0 3 1.5 1.5 0 0 1 0-3z" fill="#111"/>
                <path d="M3.5 6.5A6.5 6.5 0 0 1 8 4.8a6.5 6.5 0 0 1 4.5 1.7" stroke="#111" strokeWidth="1.5" strokeLinecap="round" fill="none"/>
                <path d="M1 3.5A10 10 0 0 1 8 1a10 10 0 0 1 7 2.5" stroke="#111" strokeWidth="1.5" strokeLinecap="round" fill="none"/>
              </svg>
              <svg width="25" height="12" viewBox="0 0 25 12" fill="none">
                <rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="#111" strokeOpacity="0.35"/>
                <rect x="2" y="2" width="17" height="8" rx="2" fill="#111"/>
                <path d="M23 4v4a2 2 0 0 0 0-4z" fill="#111" fillOpacity="0.4"/>
              </svg>
            </div>
          </div>
          {/* App content */}
          <div ref={scrollContainerRef} className="iphone-scroll" style={{
            position: "absolute", top: 38, left: 0, right: 0, bottom: 0,
            background: css.white, overflowY: "auto",
            display: "flex", flexDirection: "column",
          }}>

        <Header onBack={() => {}} />

        {phase === "confirmed" ? (
          <ConfirmationScreen onReset={() => { setPhase("delivery"); setRecipients([{ id: 1, fulfillment: "ship", address: null, shippingMethod: "standard", giftMessage: "", isComplete: false }]); setBillingData({ sameAsShipping: true, termsAgreed: false }); setPaymentData({ method: "credit", sameAsShipping: true }); setExpandedRecipient(0); }} />
        ) : (
          <div style={{ flex: 1, padding: "32px 15px", display: "flex", flexDirection: "column", gap: 24 }}>

            {/* ── STEP 1: DELIVERY ── */}
            <div>
              <StepHeader
                number="1"
                title="Delivery"
                status={phase === "payment" ? "done" : "active"}
                onEdit={phase === "payment" ? () => { setPhase("delivery"); setExpandedRecipient(recipients.length - 1); } : null}
              />
            </div>

            {phase === "delivery" && (
              <div style={{ display: "flex", flexDirection: "column", gap: 0, ...slideDown }}>
                {recipients.map((recipient, index) => (
                  <div key={recipient.id} id={"recipient-" + index}>
                    <RecipientCardDelivery
                      recipient={recipient}
                      index={index}
                      isExpanded={expandedRecipient === index}
                      onExpand={setExpandedRecipient}
                      onUpdate={(data) => updateRecipient(index, data)}
                      onRemove={() => removeRecipient(index)}
                      isOnly={recipients.length === 1}
                      showErrors={recipientErrors.has(index)}
                      onPickupSelected={index === 0 ? () => setRecipients(r => [r[0]]) : undefined}
                    />
                  </div>
                ))}

                {/* CTA stack */}
                <div style={{ display: "flex", flexDirection: "column", gap: 0 }}>
                  {recipients.length < 15 && recipients[0]?.fulfillment !== "bopis" && (
                    <div style={{
                      border: `1px solid ${css.gray100}`,
                      padding: "16px 12px 12px 12px",
                      display: "flex",
                      flexDirection: "column",
                      gap: 16,
                    }}>
                      <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
                        <span style={{ fontFamily: css.sans, fontWeight: 700, fontSize: 16, color: css.black, lineHeight: "24px" }}>
                          Want to ship to multiple people?
                        </span>
                        <span style={{ fontFamily: css.sans, fontSize: 14, color: css.secondary, lineHeight: "20px" }}>
                          You can add up to 15 recipients to your order.
                        </span>
                      </div>
                      <button
                        onClick={addRecipient}
                        style={{
                          width: "100%",
                          minHeight: 50,
                          background: css.white,
                          border: `1px solid ${css.secondary}`,
                          fontFamily: css.sans,
                          fontWeight: 700,
                          fontSize: 16,
                          color: css.black,
                          textTransform: "uppercase",
                          letterSpacing: "0.05em",
                          cursor: "pointer",
                          padding: "0 16px",
                        }}
                      >
                        ADD ANOTHER RECIPIENT
                      </button>
                    </div>
                  )}
                  <div style={{ marginTop: recipients.length < 15 && recipients[0]?.fulfillment !== "bopis" ? 24 : 0 }}>
                    <Button
                      variant="primary"
                      onClick={handleContinueToPayment}
                    >
                      Continue to Payment
                    </Button>
                  </div>
                </div>

                {/* Step 2 preview */}
                <div style={{ marginTop: 32 }}>
                  <StepHeader number="2" title="Payment" status="next" />
                </div>

                <div style={{ marginTop: 32 }}>
                  <OrderSummaryMini recipients={recipients} />
                </div>
              </div>
            )}

            {/* ── STEP 2: PAYMENT ── */}
            {phase === "payment" && (
              <div ref={paymentRef} style={{ display: "flex", flexDirection: "column", gap: 0, scrollMarginTop: 16, ...slideDown }}>
                {/* Recipient summaries */}
                {recipients.map((r, i) => (
                  <RecipientReviewCard key={r.id} recipient={r} index={i} onRemove={recipients.length > 1 ? () => removeRecipient(i) : null} />
                ))}

                {/* Step 2 header */}
                <div ref={paymentHeaderRef} style={{ marginTop: 20 }}><StepHeader number="2" title="Payment" status="active" /></div>

                <div style={{ marginTop: 20 }}>
                <PaymentSection data={paymentData} onChange={v => { setPaymentData(v); setPaymentErrors({}); }} errors={paymentErrors} />
                </div>

                <div style={{ marginTop: 20 }}>
                <BillingSection
                  data={billingData}
                  onChange={v => { setBillingData(v); setPaymentErrors({}); }}
                  firstRecipientAddr={firstRecipientAddr}
                  errors={paymentErrors}
                />
                </div>

                <div style={{ marginTop: 20 }}>
                <Button
                  variant="primary"
                  onClick={handlePlaceOrder}
                >
                  Place Order
                </Button>
                </div>

                <div style={{ marginTop: 20 }}>
                <OrderSummaryMini recipients={recipients} />
                </div>
              </div>
            )}

            {/* Need Help */}
            <div style={{ display: "flex", gap: 8, alignItems: "center", justifyContent: "center", paddingBottom: 16 }}>
              <a href="#" style={{ fontFamily: css.sans, fontSize: 18, color: css.black, textDecoration: "underline" }}>Need Help?</a>
              <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg" style={{ width: 20, height: 20, flexShrink: 0, display: "block" }}>
                <circle cx="10" cy="10" r="9.5" stroke="#111111"/>
                <path d="M10 9V14M10 7V6.5" stroke="#111111" strokeWidth="1.5" strokeLinecap="round"/>
              </svg>
            </div>
          </div>
        )}

        <Footer />
          </div>{/* end iphone-scroll */}
        </div>{/* end screen bezel */}
      </div>{/* end iphone frame */}
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<CheckoutPrototype />);
  </script>
</body>
</html>
